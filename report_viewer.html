<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>iPOS Laporan Penjualan</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
    :root {
        --bg: #f4f5f7;
        --card: #ffffff;
        --ink: #1f2933;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #0f766e;
        --accent-soft: #ccfbf1;
        --warn: #b45309;
        --good: #047857;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
                 font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    a { color: var(--accent); }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    @media (max-width: 600px) {
        .wrap { padding: 12px; }
        html, body { font-size: 13px; }
    }
    .drop {
        border: 2px dashed #9ca3af; background: #fff; border-radius: 12px;
        padding: 40px; text-align: center; color: var(--muted); cursor: pointer;
        transition: .15s;
    }
    .drop.drag { border-color: var(--accent); background: var(--accent-soft); color: var(--ink); }
    .drop input[type=file] { display: none; }
    .drop strong { color: var(--ink); }

    header.report {
        background: var(--card); border-radius: 12px; padding: 24px 28px;
        box-shadow: 0 1px 2px rgba(0,0,0,.04); margin-bottom: 20px;
    }
    header.report h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: .2px; }
    header.report .addr { color: var(--muted); font-size: 13px; }
    header.report .date { margin-top: 10px; font-weight: 600; color: var(--accent); }

    .grid { display: grid; gap: 16px; }
    .grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    @media (max-width: 900px) { .grid.cols-4 { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 760px) { .grid.cols-2 { grid-template-columns: 1fr; } }
    @media (max-width: 520px) { .grid.cols-4 { grid-template-columns: 1fr; } }

    .card { background: var(--card); border-radius: 12px; padding: 18px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .card h2 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase;
               letter-spacing: .8px; color: var(--muted); font-weight: 600; }

    .kpi .val { font-size: 22px; font-weight: 700; }
    .kpi .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--line); }
    th { font-weight: 600; color: var(--muted); font-size: 12px;
         text-transform: uppercase; letter-spacing: .5px; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    tr:last-child td { border-bottom: 0; }

    .bar { height: 8px; background: var(--accent-soft); border-radius: 4px; overflow: hidden; }
    .bar > span { display: block; height: 100%; background: var(--accent); }

    details.tx { background: var(--card); border-radius: 10px; padding: 0;
                 box-shadow: 0 1px 2px rgba(0,0,0,.04); margin-bottom: 10px;
                 border: 1px solid var(--line); }
    details.tx > summary {
        list-style: none; cursor: pointer; padding: 14px 18px;
        display: grid; grid-template-columns: 1.3fr .7fr .8fr .8fr .6fr; gap: 12px;
        align-items: center;
    }
    details.tx > summary::-webkit-details-marker { display: none; }
    details.tx > summary::after { content: "▸"; color: var(--muted); margin-left: 6px; }
    details.tx[open] > summary::after { content: "▾"; }
    details.tx > summary:hover { background: #fafafa; }
    details.tx .body { padding: 0 18px 18px; }
    details.tx .meta { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    details.tx .tag { display: inline-block; padding: 2px 8px; border-radius: 999px;
                      background: var(--accent-soft); color: var(--accent);
                      font-size: 11px; font-weight: 600; }

    @media (max-width: 760px) {
        details.tx > summary {
            grid-template-columns: 1fr auto;
            grid-template-areas:
                "no   total"
                "date count"
                "cust cust";
            row-gap: 4px;
        }
        details.tx > summary > :nth-child(1) { grid-area: no; }
        details.tx > summary > :nth-child(2) { grid-area: date; font-size: 11px; }
        details.tx > summary > :nth-child(3) { grid-area: cust; font-size: 11px; }
        details.tx > summary > :nth-child(4) { grid-area: count; text-align: right; font-size: 11px; }
        details.tx > summary > :nth-child(5) { grid-area: total; }
        details.tx .body { padding: 0 14px 14px; }
    }

    /* Stacked card layout for the 7-col items table on narrow screens. */
    @media (max-width: 700px) {
        table.items thead { display: none; }
        table.items, table.items tbody, table.items tr, table.items td {
            display: block; width: 100%;
        }
        table.items tr {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            background: #fafafa;
        }
        table.items td {
            display: flex; justify-content: space-between; align-items: baseline;
            gap: 10px; padding: 3px 0; border: 0; text-align: right;
        }
        table.items td::before {
            content: attr(data-label);
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .3px;
            flex: 0 0 auto;
        }
        /* Elevate the item name as the row's title. */
        table.items td.item-name {
            display: block; text-align: left;
            font-weight: 600; font-size: 14px;
            padding-bottom: 6px; margin-bottom: 6px;
            border-bottom: 1px dashed var(--line);
        }
        table.items td.item-name::before {
            display: block; margin-bottom: 2px;
        }
    }

    .meta-bar {
        display: flex; justify-content: space-between; align-items: center;
        gap: 10px; flex-wrap: wrap;
        padding: 10px 16px; background: #eef2ff; border-radius: 10px;
        margin-bottom: 16px; font-size: 13px; color: #3730a3;
    }
    .meta-bar > div:first-child {
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        min-width: 0; flex: 1;
    }
    .meta-bar button {
        background: #fff; border: 1px solid #c7d2fe; color: #3730a3;
        padding: 6px 12px; border-radius: 8px; cursor: pointer; font: inherit;
    }
    .meta-bar button:hover { background: #eef2ff; }

    .muted { color: var(--muted); }
    .err { color: #b91c1c; background: #fee2e2; padding: 12px 16px; border-radius: 10px; }

    /* ---- Match-to-Target (Cocokkan ke Laporan) ---- */
    .match-target { margin-bottom: 20px; }
    .match-target input[type=text] {
        width: 100%; padding: 12px 14px;
        font-family: inherit; font-size: 18px; font-weight: 600;
        font-variant-numeric: tabular-nums;
        border: 1px solid var(--line); border-radius: 10px; background: #fafafa;
    }
    .match-target input[type=text]:focus {
        outline: none; border-color: var(--accent); background: #fff;
    }
    .match-target .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .match-target .mt-summary {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
        margin-top: 16px;
    }
    .match-target .mt-summary .cell {
        background: #f9fafb; border-radius: 10px; padding: 10px 12px;
    }
    .match-target .mt-summary .cell h3 {
        margin: 0 0 4px; font-size: 11px; text-transform: uppercase;
        letter-spacing: .5px; color: var(--muted); font-weight: 600;
    }
    .match-target .mt-summary .cell .v {
        font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums;
    }
    .match-target .mt-summary .cell.good .v { color: var(--good); }
    .match-target .mt-summary .cell.bad  .v { color: #b91c1c; }
    .match-target .mt-verdict {
        margin-top: 14px; padding: 12px 14px; border-radius: 10px;
        background: #f0fdf4; color: #065f46; font-weight: 600;
    }
    .match-target .mt-verdict.bad { background: #fef2f2; color: #991b1b; }
    .match-target .mt-verdict.info { background: #eff6ff; color: #1e3a8a; }
    .match-target .mt-section-title {
        margin-top: 18px; font-size: 13px; font-weight: 600; color: var(--muted);
        text-transform: uppercase; letter-spacing: .5px;
    }
    @media (max-width: 520px) {
        .match-target .mt-summary { grid-template-columns: 1fr; }
    }

    /* All-transactions toggle */
    details.all-tx { background: var(--card); border-radius: 12px;
                     box-shadow: 0 1px 2px rgba(0,0,0,.04); margin-bottom: 14px;
                     overflow: hidden; }
    details.all-tx > summary {
        list-style: none; cursor: pointer; padding: 14px 20px;
        font-weight: 600; color: var(--accent); display: flex;
        justify-content: space-between; align-items: center;
    }
    details.all-tx > summary::-webkit-details-marker { display: none; }
    details.all-tx > summary::after { content: "▸ tampilkan"; color: var(--muted);
        font-size: 12px; font-weight: 500; }
    details.all-tx[open] > summary::after { content: "▾ sembunyikan"; }
    details.all-tx > summary:hover { background: #fafafa; }
    details.all-tx .all-tx-body { padding: 0 14px 14px; }

    @media print {
        body { background: #fff; }
        .wrap { padding: 0; }
        .drop, .meta-bar, details.tx > summary::after { display: none; }
        details.tx { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
        details.tx[open] .body { display: block; }
    }
</style>
</head>
<body>
<div class="wrap">

<!-- The JSON can be embedded here for a fully self-contained file.
     send_report.js does NOT currently write to this block — you'd paste the
     contents of report_<date>.json between the tags below. -->
<script id="report-data" type="application/json"></script>

<label class="drop" id="drop">
    <div><strong>Drop a report_*.json file here</strong> or click to pick.</div>
    <div class="muted" style="margin-top:6px;">Or append <code>#data=&lt;base64&gt;</code> to the URL.</div>
    <input type="file" id="picker" accept=".json,application/json">
</label>

<div id="out"></div>

<script>
(function () {
    var drop = document.getElementById('drop');
    var picker = document.getElementById('picker');
    var out = document.getElementById('out');

    drop.addEventListener('click', function () { picker.click(); });
    picker.addEventListener('change', function (e) {
        var f = e.target.files && e.target.files[0];
        if (f) readFile(f);
    });
    ['dragenter', 'dragover'].forEach(function (ev) {
        drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.add('drag'); });
    });
    ['dragleave', 'drop'].forEach(function (ev) {
        drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.remove('drag'); });
    });
    drop.addEventListener('drop', function (e) {
        var f = e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) readFile(f);
    });

    function readFile(file) {
        var fr = new FileReader();
        fr.onload = function () {
            try { render(JSON.parse(fr.result), file.name); }
            catch (err) { showError("Gagal membaca JSON: " + err.message); }
        };
        fr.readAsText(file);
    }

    // Try ?url=<json-url> — fetches and renders. Returns true if a URL was
    // present (rendering happens asynchronously).
    function tryUrl() {
        var m = /[?&]url=([^&#]+)/.exec(location.search);
        if (!m) return false;
        var u = decodeURIComponent(m[1]);
        out.innerHTML = '<div class="card muted">Loading ' + escapeHtml(u) + '…</div>';
        fetch(u, { cache: 'no-store' })
            .then(function (r) {
                if (!r.ok) throw new Error("HTTP " + r.status);
                return r.text();
            })
            .then(function (t) { render(JSON.parse(t), u); })
            .catch(function (e) {
                showError("Gagal memuat " + u + ": " + e.message +
                          " (kemungkinan diblokir CORS — coba download & drop file manual)");
            });
        return true;
    }

    // Try URL hash #data=<base64>
    function tryHash() {
        var h = (location.hash || '').replace(/^#/, '');
        var m = /(?:^|&)data=([^&]+)/.exec(h);
        if (!m) return false;
        try {
            var b64 = decodeURIComponent(m[1]).replace(/-/g, '+').replace(/_/g, '/');
            while (b64.length % 4) b64 += '=';
            var str = decodeURIComponent(escape(atob(b64)));
            render(JSON.parse(str), '(from URL)');
            return true;
        } catch (e) { showError("URL #data tidak valid: " + e.message); return true; }
    }

    // Try inline <script id="report-data">
    function tryInline() {
        var s = document.getElementById('report-data');
        var txt = (s && s.textContent || '').replace(/^\s+|\s+$/g, '');
        if (!txt) return false;
        try { render(JSON.parse(txt), '(embedded)'); return true; }
        catch (e) { showError("Embedded JSON tidak valid: " + e.message); return true; }
    }

    function showError(msg) { out.innerHTML = '<div class="err">' + escapeHtml(msg) + '</div>'; }

    function fmtRp(n) {
        var num = Math.round(parseFloat(n) || 0);
        var sign = num < 0 ? '-' : '';
        num = Math.abs(num);
        return sign + 'Rp ' + num.toLocaleString('id-ID');
    }
    function fmtInt(n) { return (parseInt(n, 10) || 0).toLocaleString('id-ID'); }
    function fmtDate(s) {
        if (!s) return '';
        var d = new Date(s);
        if (isNaN(d)) return s;
        return d.toLocaleString('id-ID', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }
    function fmtDateOnly(s) {
        if (!s) return '';
        var d = new Date(s);
        if (isNaN(d)) return s;
        return d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }
    function pad2(n) { return n < 10 ? '0' + n : '' + n; }
    function escapeHtml(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function render(data, sourceLabel) {
        drop.style.display = 'none';
        var html = [];

        html.push(
            '<div class="meta-bar">' +
                '<div>Sumber: <strong>' + escapeHtml(sourceLabel || '') + '</strong>' +
                    ' · Dibuat: ' + escapeHtml(data.generatedAt || '') + '</div>' +
                '<div>' +
                    '<button onclick="window.print()">Print</button> ' +
                    '<button id="reset-btn">Load lain</button>' +
                '</div>' +
            '</div>'
        );

        var s = data.store || {};
        html.push(
            '<header class="report">' +
                '<h1>' + escapeHtml(s.nama || 'Laporan Penjualan') + '</h1>' +
                (s.alamat ? '<div class="addr">' + escapeHtml(s.alamat) + '</div>' : '') +
                '<div class="date">' + escapeHtml(fmtDateOnly(data.reportDate)) + '</div>' +
            '</header>'
        );

        var sum = data.summary || {};
        html.push('<div class="grid cols-4" style="margin-bottom:20px;">');
        html.push(kpiCard('Total Penjualan', fmtRp(sum.totalAkhir), fmtInt(sum.totalTrx) + ' transaksi'));
        html.push(kpiCard('Total Item', fmtInt(sum.totalItem), 'item terjual'));
        html.push(kpiCard('Subtotal', fmtRp(sum.subtotal), 'sebelum diskon/pajak'));
        html.push(kpiCard('Diskon / Pajak',
            fmtRp(-(sum.totalDiskon || 0)) + ' / ' + fmtRp(sum.totalPajak),
            'diskon / pajak'));
        html.push('</div>');

        html.push(matchTargetCard(data));

        html.push('<div class="grid cols-2" style="margin-bottom:20px;">');
        html.push(paymentCard(data.paymentBreakdown || []));
        html.push(hourlyCard(data.hourly || []));
        html.push('</div>');

        html.push(topCustomersCard(data.topCustomers || []));

        html.push(recordsSection(data.records || []));

        out.innerHTML = html.join('');

        wireMatchTarget(data);

        var resetBtn = document.getElementById('reset-btn');
        if (resetBtn) resetBtn.addEventListener('click', function () {
            out.innerHTML = ''; drop.style.display = '';
            picker.value = ''; location.hash = '';
        });
    }

    // Sum one column across records[].header; returns number.
    function sumHeader(records, col) {
        var s = 0;
        for (var i = 0; i < records.length; i++) {
            var v = records[i] && records[i].header ? records[i].header[col] : 0;
            s += parseFloat(v) || 0;
        }
        return s;
    }

    // Build "Cocokkan ke Laporan Karyawan" card.
    function matchTargetCard(data) {
        var total = sumHeader(data.records || [], 'totalakhir');
        window.__matchRecords = data.records || [];
        window.__matchTotal = total;
        window.__matchKey = 'match-target:' + (data.reportDate || '');
        return '<div class="card match-target">' +
            '<h2>Cocokkan ke Laporan Karyawan</h2>' +
            '<p class="muted" style="margin:0 0 10px;">Masukkan total yang dilaporkan karyawan. Tools akan "mengangkat" transaksi dari urutan paling akhir ke awal sampai sisa sedekat mungkin dengan angka tersebut.</p>' +
            '<input type="text" id="mt-input" inputmode="numeric" placeholder="contoh: 26.256.000">' +
            '<div class="hint" id="mt-parsed"></div>' +
            '<div id="mt-result"></div>' +
        '</div>';
    }

    function parseRp(s) {
        if (s == null) return 0;
        var digits = String(s).replace(/[^\d]/g, '');
        return digits === '' ? NaN : parseFloat(digits);
    }

    // Greedy tail-removal: walk records from last to first, accumulating
    // "removed" totals until we're as close as possible to (total - target).
    function computeRemoval(records, target) {
        var total = sumHeader(records, 'totalakhir');
        var diff = total - target;
        if (diff < 0) {
            return { total: total, target: target, diff: diff,
                     removed: [], removedSum: 0, remaining: total, overshoot: true };
        }
        var removed = [];
        var removedSum = 0;
        for (var i = records.length - 1; i >= 0; i--) {
            var rec = records[i];
            var amt = parseFloat(rec && rec.header && rec.header.totalakhir) || 0;
            var newSum = removedSum + amt;
            if (newSum > diff) {
                // Overshoots the gap — add only if it lands closer than stopping
                if (Math.abs(newSum - diff) < Math.abs(removedSum - diff)) {
                    removed.push(rec);
                    removedSum = newSum;
                }
                break;
            }
            removed.push(rec);
            removedSum = newSum;
            if (newSum === diff) break;
        }
        return { total: total, target: target, diff: diff,
                 removed: removed, removedSum: removedSum,
                 remaining: total - removedSum, overshoot: false };
    }

    function renderMatchResult(result) {
        var container = document.getElementById('mt-result');
        if (!container) return;
        if (result == null) { container.innerHTML = ''; return; }

        var diffFromTarget = result.remaining - result.target;
        var verdictCls, verdictTxt;
        if (result.overshoot) {
            verdictCls = 'info';
            verdictTxt = 'Laporan karyawan LEBIH BESAR dari total tool (selisih ' + fmtRp(-result.diff) + '). Tidak ada transaksi yang perlu diangkat.';
        } else if (Math.abs(diffFromTarget) < 1) {
            verdictCls = '';
            verdictTxt = '✓ Cocok persis setelah mengangkat ' + result.removed.length + ' transaksi (' + fmtRp(result.removedSum) + ').';
        } else if (Math.abs(diffFromTarget) <= 10000) {
            verdictCls = '';
            verdictTxt = '≈ Hampir cocok. Setelah mengangkat ' + result.removed.length + ' transaksi, sisa ' + fmtRp(result.remaining) + ' (selisih ' + (diffFromTarget >= 0 ? '+' : '-') + fmtRp(Math.abs(diffFromTarget)) + ' dari laporan).';
        } else {
            verdictCls = 'bad';
            verdictTxt = 'Tidak bisa cocok tepat. Sisa ' + fmtRp(result.remaining) + ' (selisih ' + (diffFromTarget >= 0 ? '+' : '-') + fmtRp(Math.abs(diffFromTarget)) + ' dari laporan).';
        }

        var html = [];
        html.push(
            '<div class="mt-summary">' +
                '<div class="cell"><h3>Total Tool</h3><div class="v">' + escapeHtml(fmtRp(result.total)) + '</div></div>' +
                '<div class="cell"><h3>Laporan Karyawan</h3><div class="v">' + escapeHtml(fmtRp(result.target)) + '</div></div>' +
                '<div class="cell ' + (result.overshoot ? 'bad' : 'good') + '"><h3>Selisih (diangkat)</h3><div class="v">' + escapeHtml(fmtRp(result.removedSum)) + '</div></div>' +
            '</div>'
        );
        html.push('<div class="mt-verdict ' + verdictCls + '">' + escapeHtml(verdictTxt) + '</div>');

        if (result.removed.length > 0) {
            html.push('<div class="mt-section-title">Transaksi yang "diangkat" (' + result.removed.length + ')</div>');
            // result.removed is in reverse order (last-first); render that way
            // so the user sees the actual order of removal.
            result.removed.forEach(function (rec) {
                html.push(transactionDetails(rec));
            });
        }

        container.innerHTML = html.join('');
    }

    function wireMatchTarget(data) {
        var input = document.getElementById('mt-input');
        var parsedEl = document.getElementById('mt-parsed');
        if (!input) return;

        var saved;
        try { saved = localStorage.getItem(window.__matchKey) || ''; } catch (e) { saved = ''; }
        if (saved) input.value = saved;

        function update() {
            var raw = input.value;
            // keep the input pretty-formatted as the user types
            var n = parseRp(raw);
            if (!isNaN(n) && raw !== '') {
                var pretty = n.toLocaleString('id-ID');
                if (pretty !== raw) {
                    var caret = input.selectionStart;
                    var before = raw.length;
                    input.value = pretty;
                    var after = pretty.length;
                    try { input.setSelectionRange(caret + (after - before), caret + (after - before)); } catch (e) { }
                }
                parsedEl.textContent = 'Diparse sebagai: ' + fmtRp(n);
                try { localStorage.setItem(window.__matchKey, input.value); } catch (e) {}
                renderMatchResult(computeRemoval(window.__matchRecords, n));
            } else {
                parsedEl.textContent = '';
                try { localStorage.removeItem(window.__matchKey); } catch (e) {}
                renderMatchResult(null);
            }
        }

        input.addEventListener('input', update);
        if (input.value) update();
    }

    function kpiCard(title, val, sub) {
        return '<div class="card kpi">' +
                   '<h2>' + escapeHtml(title) + '</h2>' +
                   '<div class="val">' + escapeHtml(val) + '</div>' +
                   '<div class="sub">' + escapeHtml(sub) + '</div>' +
               '</div>';
    }

    function paymentCard(rows) {
        if (!rows.length) return '<div class="card"><h2>Pembayaran</h2><div class="muted">Tidak ada data</div></div>';
        var total = rows.reduce(function (a, r) { return a + (parseFloat(r.total) || 0); }, 0);
        var body = rows.map(function (r) {
            var pct = total > 0 ? Math.round((r.total / total) * 100) : 0;
            return '<tr>' +
                '<td>' + escapeHtml(r.carabayar || 'Lainnya') + '</td>' +
                '<td class="num">' + fmtInt(r.count) + '</td>' +
                '<td class="num">' + escapeHtml(fmtRp(r.total)) + '</td>' +
                '<td style="width:120px;"><div class="bar"><span style="width:' + pct + '%"></span></div></td>' +
            '</tr>';
        }).join('');
        return '<div class="card"><h2>Rincian Pembayaran</h2>' +
            '<table><thead><tr><th>Cara Bayar</th><th class="num">Trx</th><th class="num">Total</th><th></th></tr></thead>' +
            '<tbody>' + body + '</tbody></table></div>';
    }

    function hourlyCard(rows) {
        if (!rows.length) return '<div class="card"><h2>Per Jam</h2><div class="muted">Tidak ada data</div></div>';
        var max = rows.reduce(function (a, r) { return Math.max(a, parseFloat(r.total) || 0); }, 0);
        var body = rows.map(function (r) {
            var h = parseInt(r.hour, 10) || 0;
            var pct = max > 0 ? Math.round((r.total / max) * 100) : 0;
            return '<tr>' +
                '<td>' + pad2(h) + ':00 – ' + pad2(h + 1) + ':00</td>' +
                '<td class="num">' + fmtInt(r.count) + '</td>' +
                '<td class="num">' + escapeHtml(fmtRp(r.total)) + '</td>' +
                '<td style="width:120px;"><div class="bar"><span style="width:' + pct + '%"></span></div></td>' +
            '</tr>';
        }).join('');
        return '<div class="card"><h2>Penjualan Per Jam</h2>' +
            '<table><thead><tr><th>Jam</th><th class="num">Trx</th><th class="num">Total</th><th></th></tr></thead>' +
            '<tbody>' + body + '</tbody></table></div>';
    }

    function topCustomersCard(rows) {
        if (!rows.length) return '';
        var body = rows.map(function (r, i) {
            return '<tr>' +
                '<td style="width:40px;" class="muted">' + (i + 1) + '</td>' +
                '<td>' + escapeHtml(r.nama || '-') + '</td>' +
                '<td class="num">' + fmtInt(r.count) + '</td>' +
                '<td class="num">' + escapeHtml(fmtRp(r.total)) + '</td>' +
            '</tr>';
        }).join('');
        return '<div class="card" style="margin-bottom:20px;"><h2>Top Pelanggan</h2>' +
            '<table><thead><tr><th></th><th>Pelanggan</th><th class="num">Trx</th><th class="num">Total</th></tr></thead>' +
            '<tbody>' + body + '</tbody></table></div>';
    }

    function transactionDetails(rec) {
        var hdr = rec.header || {};
        var items = rec.items || [];
        return '<details class="tx">' +
            '<summary>' +
                '<div><strong>' + escapeHtml(hdr.notransaksi || '') + '</strong>' +
                    (hdr.carabayar ? ' <span class="tag">' + escapeHtml(hdr.carabayar) + '</span>' : '') +
                '</div>' +
                '<div class="muted">' + escapeHtml(fmtDate(hdr.tanggal)) + '</div>' +
                '<div class="muted">' + escapeHtml(hdr.kodesupel || '') + '</div>' +
                '<div class="num">' + fmtInt(hdr.totalitem) + ' item</div>' +
                '<div class="num"><strong>' + escapeHtml(fmtRp(hdr.totalakhir)) + '</strong></div>' +
            '</summary>' +
            '<div class="body">' +
                '<div class="meta">' +
                    'Subtotal ' + escapeHtml(fmtRp(hdr.subtotal)) + ' · ' +
                    'Diskon ' + escapeHtml(fmtRp(hdr.potfaktur)) + ' · ' +
                    'Pajak ' + escapeHtml(fmtRp(hdr.pajak)) + ' · ' +
                    'Kasir ' + escapeHtml(hdr.user1 || '-') +
                '</div>' +
                itemsTable(items) +
            '</div>' +
        '</details>';
    }

    function recordsSection(records) {
        if (!records.length) return '';
        var body = records.map(transactionDetails).join('');
        return '<details class="all-tx">' +
            '<summary>' +
                '<span>Semua Transaksi (' + records.length + ')</span>' +
            '</summary>' +
            '<div class="all-tx-body">' + body + '</div>' +
        '</details>';
    }

    function itemsTable(items) {
        if (!items.length) return '<div class="muted">Tidak ada item.</div>';
        var body = items.map(function (it) {
            return '<tr>' +
                '<td data-label="Kode">' + escapeHtml(it.kodeitem || '') + '</td>' +
                '<td data-label="Nama" class="item-name">' + escapeHtml(it.namaitem || '') + '</td>' +
                '<td class="num" data-label="Qty">' + fmtInt(it.jumlah) + '</td>' +
                '<td data-label="Sat">' + escapeHtml(it.satuan || '') + '</td>' +
                '<td class="num" data-label="Harga">' + escapeHtml(fmtRp(it.harga)) + '</td>' +
                '<td class="num" data-label="Diskon">' + escapeHtml(fmtRp(it.potongan)) + '</td>' +
                '<td class="num" data-label="Total"><strong>' + escapeHtml(fmtRp(it.total)) + '</strong></td>' +
            '</tr>';
        }).join('');
        return '<table class="items">' +
            '<thead><tr>' +
                '<th>Kode</th><th>Nama</th><th class="num">Qty</th><th>Sat</th>' +
                '<th class="num">Harga</th><th class="num">Diskon</th><th class="num">Total</th>' +
            '</tr></thead><tbody>' + body + '</tbody></table>';
    }

    if (!tryUrl() && !tryHash() && !tryInline()) {
        // nothing auto-loaded; leave the drop zone visible
    } else {
        drop.style.display = 'none';
    }
})();
</script>
</div>
</body>
</html>
